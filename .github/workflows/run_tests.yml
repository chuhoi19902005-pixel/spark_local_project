name: PySpark Auto Validation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  pyspark-testing:
    runs-on: ubuntu-latest

    steps:
      # 步驟一：複製 GitHub 倉庫程式碼 (升級至 v4)
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 步驟二：安裝 Java 17 (升級至 v4)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 步驟三：安裝 Python 3.11 (升級至 v5)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步驟四：安裝 Python 相依套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark pytest pytest-html

      # 步驟五：執行測試
      - name: Execute Pytest Suite
        run: |
          python -m pytest

      # 步驟六：上傳測試報告 (升級至 v4，解決 v3 被廢棄的錯誤)
      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyspark-test-report
          path: reports/