[pytest]
# 1. addopts (Additional Options)：每次執行測試時，自動加上的指令參數
#    -v: 顯示詳細測試資訊 (verbose)
#    --html=reports/report.html: 將報告產生在自動建立的 reports 資料夾下，並命名為 report.html
#    --self-contained-html: 將 CSS 樣式打包進單一網頁檔，方便分享
addopts = -v --html=reports/report.html --self-contained-html

# 2. testpaths：指定 pytest 預設要去哪一個資料夾尋找測試檔案
#    這能加快搜尋速度，避免去掃描 .venv 虛擬環境
testpaths = tests

# 3. python_files：指定哪些檔名的檔案是測試檔案
python_files = test_*.py

# 4. python_functions：指定哪些函數名稱是測試案例
python_functions = test_*

# =================================================================
# 新增：即時日誌設定 (Log CLI)
# =================================================================
# 1. 啟用即時日誌輸出到主控台
log_cli = true

# 2. 設定顯示的最低日誌等級 (建議設為 INFO 或 DEBUG)
log_cli_level = INFO

# 3. 自訂日誌顯示格式 (包含：時間、日誌級別、檔案與行號、訊息)
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)

# 4. 設定時間格式
log_cli_date_format = %Y-%m-%d %H:%M:%S

# =================================================================
# 新增：自動將 Log 寫入檔案設定
# =================================================================
# 1. 指定 Log 檔案存放路徑 (pytest 會自動建立資料夾與檔案)
log_file = logs/running.log

# 2. 設定寫入檔案的日誌等級
log_file_level = INFO

# 3. 設定檔案中的日誌格式
log_file_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S

# 必須在 pytest.ini 中註冊標籤
markers =
    unit: 快速單元測試
    regression: 完整回歸測試

